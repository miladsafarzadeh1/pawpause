<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Paw Pause — vanilla example</title>
  <style>
    body { font: 15px system-ui; max-width: 640px; margin: 60px auto; padding: 0 20px; }
    textarea { width: 100%; height: 160px; padding: 12px; font: 14px ui-monospace, monospace; }
    #banner { display: none; color: #b4480f; margin-top: 8px; }
    #banner.on { display: block; }
  </style>
</head>
<body>
  <h1>🐾 Paw Pause</h1>
  <p>Type normally — fine. Mash adjacent keys at once — clamped. Press Esc to override.</p>
  <textarea id="note" placeholder="Type here…"></textarea>
  <div id="banner" role="status" aria-live="polite">Holding suspected cat input. Press Esc to override.</div>

  <script type="module">
    // In a real project: import { attachGuard } from "pawpause";
    import { attachGuard } from "../dist/index.js";

    const banner = document.getElementById("banner");
    attachGuard(document.getElementById("note"), {
      // uncontrolled <textarea>: let the guard roll back automatically
      onClamp: () => banner.classList.add("on"),
      onRelease: () => banner.classList.remove("on"),
    });
  </script>
</body>
</html>
